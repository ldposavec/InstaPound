spring.application.name=InstaPound

spring.jpa.defer-datasource-initialization=true

storage.type=LOCAL
storage.local-path=./uploads
storage.thumbnail-path=./uploads/thumbnails

# Disable OAuth2 for tests (no Okta config)
# OAuth2 will be disabled when these properties are not present

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

logging.level.hr.algebra.nrako.instapound=INFO

spring.main.allow-bean-definition-overriding=true
