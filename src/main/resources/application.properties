spring.application.name=InstaPound

# Database Configuration
spring.jpa.defer-datasource-initialization=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Session Configuration
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always

# Storage Configuration
storage.type=LOCAL
storage.local-path=./uploads
storage.thumbnail-path=./uploads/thumbnails

# S3 Configuration (optional - uncomment and fill for cloud storage)
# storage.s3-bucket-name=your-bucket-name
# storage.s3-region=us-east-1
# storage.s3-access-key=your-access-key
# storage.s3-secret-key=your-secret-key

# OAuth2 Configuration (uncomment and fill for Google/GitHub login)
# Google OAuth2
# spring.security.oauth2.client.registration.google.client-id=your-google-client-id
# spring.security.oauth2.client.registration.google.client-secret=your-google-client-secret
# spring.security.oauth2.client.registration.google.scope=email,profile

# GitHub OAuth2
# spring.security.oauth2.client.registration.github.client-id=your-github-client-id
# spring.security.oauth2.client.registration.github.client-secret=your-github-client-secret
# spring.security.oauth2.client.registration.github.scope=user:email,read:user

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# Logging
logging.level.hr.algebra.nrako.instapound=INFO

# Enable scheduled tasks for package changes
spring.main.allow-bean-definition-overriding=true