spring.application.name=InstaPound

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:instapound
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# File Upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Local Storage Configuration
app.storage.local.path=uploads

# Cloudinary Configuration (optional - leave empty for local storage only)
app.storage.cloudinary.cloud-name=
app.storage.cloudinary.api-key=
app.storage.cloudinary.api-secret=

# OAuth2 Configuration (optional - commented out by default)
# To enable OAuth2, uncomment and fill in the credentials below
# spring.security.oauth2.client.registration.google.client-id=your-google-client-id
# spring.security.oauth2.client.registration.google.client-secret=your-google-client-secret
# spring.security.oauth2.client.registration.github.client-id=your-github-client-id
# spring.security.oauth2.client.registration.github.client-secret=your-github-client-secret

# Logging
logging.level.hr.algebra.nrako.instapound=DEBUG
