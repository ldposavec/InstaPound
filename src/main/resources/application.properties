spring.application.name=InstaPound

spring.jpa.defer-datasource-initialization=true

# Storage Configuration
# Use LOCAL for local file storage, CLOUDINARY for cloud storage
storage.type=LOCAL
storage.local-path=./uploads
storage.thumbnail-path=./uploads/thumbnails

# Cloudinary Configuration (uncomment and configure for cloud storage)
# storage.type=CLOUDINARY
# storage.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
# storage.cloudinary.api-key=${CLOUDINARY_API_KEY:}
# storage.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
# storage.cloudinary.folder=instapound

# Okta OAuth2 Configuration (optional - comment out to disable OAuth2)
# To enable Okta OAuth2, uncomment the following lines and configure with your Okta domain:
# spring.security.oauth2.client.registration.okta.client-id=${OKTA_CLIENT_ID:your-client-id}
# spring.security.oauth2.client.registration.okta.client-secret=${OKTA_CLIENT_SECRET:your-client-secret}
# spring.security.oauth2.client.registration.okta.scope=openid,profile,email
# spring.security.oauth2.client.registration.okta.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
# spring.security.oauth2.client.registration.okta.authorization-grant-type=authorization_code
# spring.security.oauth2.client.provider.okta.issuer-uri=${OKTA_ISSUER_URI:https://your-domain.okta.com/oauth2/default}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

logging.level.hr.algebra.nrako.instapound=INFO

spring.main.allow-bean-definition-overriding=true