name: Java CI/CD

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      MAVEN_OPTS: -Xmx2g
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Show Java and Maven versions
        run: |
          java -version
          ./mvnw -v

      - name: Run Maven tests
        run: ./mvnw -B --fail-at-end test

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports

      - name: Upload Jacoco exec
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-exec
          path: target/jacoco.exec

      - name: Show test summary (optional)
        if: always()
        run: |
          echo "=== Surefire reports ==="
          ls -la target/surefire-reports || true
          echo "=== surefire files ==="
          find target/surefire-reports -maxdepth 1 -type f -print || true

